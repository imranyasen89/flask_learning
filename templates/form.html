<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
</head>
<body>
    <h2>Student Form</h2>

        <button type="submit"> Save </button>
    </form>

</body>
</html>
